kind = "web"
previewPath = "/"
title = "Smoke Shop"
version = "1.0.0"
id = "artifacts/smoke-shop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24283

[services.development]
run = "pnpm --filter @workspace/smoke-shop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smoke-shop", "run", "build" ]
publicDir = "artifacts/smoke-shop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24283"
BASE_PATH = "/"
